# NOTE: `docker compose up` with this file's GPU device-reservation
# (deploy.resources.reservations.devices, below) was confirmed on real
# hardware to NOT mount NVIDIA's GLX/Vulkan userspace libraries into the
# container -- UnrealEditor crashed with VulkanRHI VK_ERROR_INCOMPATIBLE_DRIVER
# even though the libraries exist on the host and a plain
# `docker run --gpus all` on the same host mounts them correctly. Use
# `./run.sh` to actually run this stack; this file is kept for
# `docker compose build` and as a reference for the container's
# config/ports/volumes, not for `docker compose up`.
services:
  unreal-gui:
    build:
      context: .
      args:
        UE_IMAGE: ghcr.io/epicgames/unreal-engine:dev-5.8
    image: homeward-gui:dev-5.8

    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
      DISPLAY: ":1"
      UPROJECT_PATH: /workspace/Homeward.uproject
      # VNC_PASSWORD: set-your-own   # uncomment to pin it; otherwise a
      #                              # random one is generated and printed
      #                              # to `docker compose logs` on startup

    ports:
      - "8444:8444"   # KasmVNC's browser port (confirm against the
                       # "Paste this url in your browser" line in
                       # `docker compose logs` -- vncserver prints its
                       # actual listening port there on every start)

    volumes:
      # Mount the actual project root (one level up from this gui/ dir)
      # into /workspace, matching UPROJECT_PATH above.
      - ../:/workspace

    shm_size: "16gb"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
